<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">TinyHouse access model</title>
  <desc id="desc">The diagram shows SSH access from a client through a VPS reverse tunnel to Windows, WSL, and the Raspberry Pi inventory.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 1.6; }
      .gateway { fill: #eff6ff; stroke: #2563eb; }
      .windows { fill: #ecfdf3; stroke: #16a34a; }
      .linux { fill: #fff7ed; stroke: #ea580c; }
      .text { font-family: Inter, Arial, sans-serif; font-size: 16px; fill: #0f172a; }
      .small { font-size: 13px; fill: #475569; }
      .line { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .label { font-size: 13px; fill: #334155; font-weight: 700; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
  </defs>
  <rect class="bg" width="980" height="430" />

  <rect x="45" y="150" width="160" height="82" rx="8" class="box" />
  <text x="77" y="184" class="text">Client PC</text>
  <text x="77" y="208" class="small">ssh tinyhouse</text>

  <rect x="285" y="150" width="170" height="82" rx="8" class="box gateway" />
  <text x="318" y="184" class="text">VPS</text>
  <text x="318" y="208" class="small">46.224.118.171</text>

  <rect x="535" y="80" width="190" height="82" rx="8" class="box windows" />
  <text x="566" y="114" class="text">Windows PC</text>
  <text x="566" y="138" class="small">BTQ8X1</text>

  <rect x="535" y="250" width="190" height="82" rx="8" class="box linux" />
  <text x="566" y="284" class="text">WSL Ubuntu</text>
  <text x="566" y="308" class="small">~/lab-ansible</text>

  <rect x="805" y="250" width="140" height="82" rx="8" class="box linux" />
  <text x="830" y="284" class="text">Raspberry Pis</text>
  <text x="830" y="308" class="small">DNAT SSH</text>

  <path class="line" d="M205 191 L285 191" />
  <path class="line" d="M455 191 C500 191 500 121 535 121" />
  <path class="line" d="M630 162 L630 250" />
  <path class="line" d="M725 291 L805 291" />

  <text x="222" y="176" class="label">SSH key</text>
  <text x="470" y="150" class="label">reverse tunnel</text>
  <text x="645" y="214" class="label">wsl.exe</text>
  <text x="744" y="276" class="label">Ansible</text>
</svg>
