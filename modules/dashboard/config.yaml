  port: 22
  username: ''
  password: TH101WS2025
  remote_platform: windows
  connect_timeout_seconds: 80
  status_timeout_seconds: 180
  status_chunk_size: 3
local:
  shell:
    unix: /bin/bash
    windows: powershell.exe
shell:
  default_user: admin
  identity_file: ~/.ssh/id_ed25519
  identities_only: true
  password_authentication: false
  keyboard_interactive_authentication: false
  strict_host_key_checking: accept-new
mqtt:
  host: 127.0.0.1
  port: 1883
  keepalive_seconds: 30
  topics:
  - '#'
  - $SYS/#
  remote_subscribe_command: '"C:\Program Files\Mosquitto\mosquitto_sub.exe" -h 127.0.0.1
    -p 1883 -t "#" -t "$SYS/#" -v'
camera:
  access_mode: direct
  ip: 132.180.196.165
  port: 80
  scheme: http
  verify_tls: false
  path: /
  username: admin
  password: CAM101TH2025
