---
- name: Bootstrap admin, packages, and services (keep current connection user)
  hosts: raspis
  serial: 1
  gather_facts: true
  become: true

  vars:
    admin_user: admin
    admin_groups:
      - wheel

  tasks:
    - name: Ensure admin user exists
      ansible.builtin.user:
        name: "{{ admin_user }}"
        state: present
        shell: /bin/bash
        create_home: true
        groups: "{{ admin_groups }}"
        append: true

    - name: Lock admin password (no password login)
      ansible.builtin.user:
        name: "{{ admin_user }}"
        password_lock: true

    - name: Allow passwordless sudo for admin
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/90-{{ admin_user }}-nopasswd"
        content: "{{ admin_user }} ALL=(ALL) NOPASSWD:ALL\n"
        owner: root
        group: root
        mode: "0440"
        validate: "visudo -cf %s"

    - name: Install admin SSH key from controller public key
      ansible.posix.authorized_key:
        user: "{{ admin_user }}"
        state: present
        key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"

    - name: Disable SSH password auth
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^{{ item.key }}\\s+"
        line: "{{ item.key }} {{ item.value }}"
        backup: true
      loop:
        - { key: "PasswordAuthentication", value: "no" }
        - { key: "PermitEmptyPasswords", value: "no" }
        - { key: "KbdInteractiveAuthentication", value: "no" }

    - name: Restart sshd
      ansible.builtin.service:
        name: sshd
        state: restarted

    - name: Set hostname (device name)
      ansible.builtin.hostname:
        name: "{{ hostvars[inventory_hostname].hostname | default(inventory_hostname) }}"

    - name: Install cockpit, python, and mosquitto (dnf)
      ansible.builtin.dnf:
        name:
          - cockpit
          - python3
          - python3-pip
          - mosquitto
        state: present
        update_cache: true

    - name: Install MQTT python client library (pip)
      ansible.builtin.pip:
        name:
          - paho-mqtt
        executable: pip3

    - name: Enable cockpit socket
      ansible.builtin.systemd:
        name: cockpit.socket
        enabled: true
        state: started

    - name: Configure mosquitto broker
      ansible.builtin.copy:
        dest: /etc/mosquitto/mosquitto.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          pid_file /run/mosquitto/mosquitto.pid
          persistence true
          persistence_location /var/lib/mosquitto/
          log_dest syslog
          listener 1883 0.0.0.0
          allow_anonymous true

    - name: Enable mosquitto
      ansible.builtin.systemd:
        name: mosquitto
        enabled: true
        state: restarted

- name: Remove all non-system users except admin (log in as admin)
  hosts: raspis
  serial: 1
  gather_facts: true
  become: true

  vars:
    ansible_user: admin
    admin_user: admin
    keep_users:
      - root
      - "{{ admin_user }}"
      - nobody
      - nfsnobody

  tasks:
    - name: Collect passwd entries
      ansible.builtin.getent:
        database: passwd

    - name: Compute removable users (UID >= 1000, not in keep list)
      ansible.builtin.set_fact:
        removable_users: >-
          {%- set users = [] -%}
          {%- for item in (getent_passwd | dict2items) -%}
          {%- set name = item.key -%}
          {%- set uid = (item.value[2] | int) -%}
          {%- if uid >= 1000 and (name not in keep_users) -%}
          {%- set _ = users.append(name) -%}
          {%- endif -%}
          {%- endfor -%}
          {{ users }}

    - name: Remove removable users and their home dirs
      ansible.builtin.user:
        name: "{{ item }}"
        state: absent
        remove: true
      loop: "{{ removable_users }}"
